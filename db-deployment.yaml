apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: postgres:17
          envFrom:
            - secretRef:
                name: db-secret
          ports:
            - containerPort: 5432
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m" # 0.25 cores
          startupProbe:
            exec:
              command:
                - pg_isready
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30 # Probe for 30 * 10s = 300s before failure
          livenessProbe:
            exec:
              command:
                - pg_isready
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3 # Probe for 3 * 10s = 30s before failure
          volumeMounts:
            - mountPath: "/var/lib/postgresql/data"
              name: db-volume
      volumes:
        - name: db-volume
          persistentVolumeClaim:
            claimName: db-pvc
